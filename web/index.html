<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traffic Monitor</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --bg-soft: #edf2f8;
        --panel: rgba(255, 255, 255, 0.92);
        --panel-strong: #ffffff;
        --line: #dbe5f0;
        --line-strong: #c2d2e4;
        --text: #1e2a3a;
        --muted: #748399;
        --muted-strong: #5b6a7f;
        --accent: #5f46ff;
        --accent-soft: rgba(95, 70, 255, 0.12);
        --accent-border: rgba(95, 70, 255, 0.22);
        --good: #17c49b;
        --up: #3db8ff;
        --down: #31d184;
        --danger: #ff6d7a;
        --shadow: 0 18px 40px rgba(61, 76, 99, 0.08);
        --radius-xl: 26px;
        --radius-lg: 20px;
        --radius-md: 16px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(95, 70, 255, 0.08), transparent 30%),
          radial-gradient(circle at top right, rgba(61, 184, 255, 0.08), transparent 26%),
          linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%);
        color: var(--text);
        font-family:
          "Segoe UI", "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
      }

      body {
        padding: 16px;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .page {
        width: min(1420px, 100%);
        margin: 0 auto;
      }

      .app-shell {
        display: grid;
        gap: 14px;
      }

      .panel {
        position: relative;
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .topbar {
        padding: 16px 18px;
      }

      .topbar-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .brand-mark {
        display: none;
      }

      .brand-copy h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.1;
      }

      .brand-copy p {
        display: none;
      }

      .dimension-tabs {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px;
        border-radius: 16px;
        background: var(--bg-soft);
      }

      .dimension-tab {
        min-width: 88px;
        padding: 10px 16px;
        border: 0;
        border-radius: 12px;
        background: transparent;
        color: var(--muted-strong);
        cursor: pointer;
        font-weight: 700;
        transition:
          background-color 180ms ease,
          color 180ms ease,
          transform 180ms ease;
      }

      .dimension-tab.active {
        background: linear-gradient(135deg, var(--accent), #7867ff);
        color: #fff;
        box-shadow: 0 10px 20px rgba(95, 70, 255, 0.22);
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .toolbar-group {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px;
        border-radius: 16px;
        background: var(--bg-soft);
      }

      .toolbar-field {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 42px;
        padding: 0 12px;
        border-radius: 12px;
        background: #fff;
        border: 1px solid transparent;
      }

      .toolbar-field label {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .toolbar-field input,
      .toolbar-field select {
        border: 0;
        background: transparent;
        color: var(--text);
        min-width: 0;
      }

      .toolbar-field input:focus,
      .toolbar-field select:focus,
      .toolbar-action:focus,
      .dimension-tab:focus,
      .primary-row:focus,
      .secondary-row:focus {
        outline: none;
      }

      .toolbar-field:focus-within,
      .toolbar-action:focus,
      .dimension-tab:focus,
      .primary-row:focus,
      .secondary-row:focus {
        box-shadow: 0 0 0 3px rgba(95, 70, 255, 0.14);
      }

      .toolbar-action {
        min-height: 42px;
        padding: 0 16px;
        border: 0;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 700;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          background-color 180ms ease;
      }

      .toolbar-action:hover,
      .dimension-tab:hover {
        transform: translateY(-1px);
      }

      .toolbar-action.primary {
        background: linear-gradient(135deg, var(--accent), #7867ff);
        color: #fff;
        box-shadow: 0 10px 18px rgba(95, 70, 255, 0.2);
      }

      .toolbar-action.ghost {
        background: #fff;
        color: var(--muted-strong);
        border: 1px solid var(--line);
      }

      .toolbar-action.danger {
        background: rgba(255, 109, 122, 0.12);
        color: #d14c58;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        padding: 14px 16px;
        min-height: 94px;
      }

      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .card-label {
        color: var(--muted);
        font-size: 12px;
      }

      .card-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 34px;
        height: 34px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 700;
      }

      .card-badge.count {
        background: rgba(95, 70, 255, 0.12);
        color: var(--accent);
      }

      .card-badge.up {
        background: rgba(61, 184, 255, 0.12);
        color: #1a95da;
      }

      .card-badge.down {
        background: rgba(49, 209, 132, 0.12);
        color: #0f9c5e;
      }

      .card-badge.total {
        background: rgba(255, 109, 122, 0.12);
        color: #cf4e5c;
      }

      .card-value {
        margin-top: 10px;
        font-size: clamp(24px, 2.2vw, 32px);
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .card-note {
        display: none;
      }

      .dashboard {
        display: grid;
        grid-template-columns: minmax(320px, 0.92fr) minmax(0, 1.48fr);
        grid-template-rows: auto auto;
        gap: 14px;
      }

      .ranking-panel,
      .trend-panel,
      .detail-panel {
        padding: 16px;
        min-height: 0;
      }

      .ranking-panel {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 380px;
      }

      .trend-panel {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 380px;
      }

      .detail-panel {
        grid-column: 1 / -1;
        display: grid;
        grid-template-rows: auto auto 1fr;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
        margin-bottom: 14px;
      }

      .panel-title {
        margin: 0;
        font-size: 18px;
      }

      .scroll-wrap {
        min-height: 0;
        overflow: auto;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(248, 251, 255, 0.96), rgba(243, 247, 252, 0.86));
      }

      .ranking-list {
        min-height: 0;
        overflow: auto;
        padding-right: 8px;
      }

      .ranking-item {
        margin-bottom: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid transparent;
        cursor: pointer;
        transition:
          background-color 180ms ease,
          border-color 180ms ease,
          box-shadow 180ms ease,
          transform 180ms ease;
      }

      .ranking-item:hover {
        transform: translateY(-1px);
        border-color: rgba(95, 70, 255, 0.16);
        background: rgba(95, 70, 255, 0.04);
        box-shadow: 0 8px 18px rgba(95, 70, 255, 0.08);
      }

      .ranking-item.active {
        background: rgba(95, 70, 255, 0.1);
        border-color: rgba(95, 70, 255, 0.22);
      }

      .ranking-main {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .ranking-title {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
      }

      .ranking-metrics {
        margin-top: 8px;
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        font-size: 11px;
        color: var(--muted);
        font-weight: 700;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      .primary-table {
        min-width: 640px;
      }

      .secondary-table {
        min-width: 760px;
      }

      .detail-table {
        min-width: 1080px;
      }

      th,
      td {
        padding: 12px 12px;
        border-bottom: 1px solid rgba(194, 210, 228, 0.55);
        text-align: left;
        vertical-align: top;
        font-size: 13px;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: rgba(247, 250, 254, 0.98);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .rank {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 999px;
        background: rgba(95, 70, 255, 0.12);
        color: var(--accent);
        font-weight: 800;
        font-size: 12px;
      }

      .mono {
        font-family:
          "SFMono-Regular", "Consolas", "Liberation Mono", monospace;
        white-space: nowrap;
      }

      .truncate {
        display: block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .truncate.host {
        max-width: 280px;
      }

      .truncate.label {
        max-width: 220px;
      }

      .truncate.ip {
        max-width: 140px;
      }

      .truncate.proc {
        max-width: 180px;
      }

      .truncate.outbound {
        max-width: 140px;
      }

      .truncate.card-title {
        max-width: 100%;
      }

      .primary-row,
      .secondary-row {
        cursor: pointer;
        transition: background-color 180ms ease;
      }

      .primary-row:hover,
      .secondary-row:hover {
        background: rgba(95, 70, 255, 0.04);
      }

      .primary-row.active,
      .secondary-row.active {
        background:
          linear-gradient(90deg, rgba(95, 70, 255, 0.12), transparent 75%),
          rgba(255, 255, 255, 0.5);
      }

      #trendCanvas {
        width: 100%;
        height: 100%;
        min-height: 0;
        display: block;
        border-radius: 18px;
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(245, 250, 255, 0.96), rgba(239, 245, 251, 0.88)),
          #fff;
      }

      .detail-grid {
        min-height: 0;
      }

      .detail-pane {
        min-height: 0;
      }

      .compact-table th,
      .compact-table td {
        padding: 10px;
        font-size: 12px;
      }

      .detail-cards {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .detail-card {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 12px;
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(246, 249, 253, 0.92));
        border: 1px solid var(--line);
        min-width: 0;
      }

      .detail-card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .detail-card-title {
        min-width: 0;
        color: #f24b9a;
        font-size: 12px;
        font-weight: 800;
      }

      .detail-card-total {
        flex-shrink: 0;
        color: var(--accent);
        font-weight: 800;
        font-size: 12px;
      }

      .detail-card-meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      .detail-table-shell {
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(248, 251, 255, 0.96), rgba(243, 247, 252, 0.86));
      }

      .detail-table-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid rgba(194, 210, 228, 0.55);
        background: rgba(247, 250, 254, 0.92);
      }

      .detail-search {
        width: 240px;
        max-width: 100%;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
      }

      .detail-search:focus {
        outline: none;
        border-color: rgba(95, 70, 255, 0.38);
        box-shadow: 0 0 0 3px rgba(95, 70, 255, 0.12);
      }

      .detail-table-wrap {
        overflow: auto;
        max-height: 520px;
      }

      .expanded-row td {
        background: rgba(246, 249, 253, 0.92);
        padding: 14px;
      }

      .expanded-block {
        display: grid;
        gap: 12px;
      }

      .pane-title {
        color: var(--muted-strong);
        font-size: 12px;
        font-weight: 700;
      }

      .chips {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(49, 209, 132, 0.12);
        color: #118154;
        white-space: nowrap;
        font-size: 12px;
      }

      .chip.route {
        background: rgba(61, 184, 255, 0.12);
        color: #1a95da;
      }

      .empty,
      .detail-empty {
        padding: 28px 16px;
        text-align: center;
        color: var(--muted);
      }

      .hidden-select {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
      }

      @media (max-width: 1180px) {
        .cards {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .detail-box {
          flex: 1 1 calc(50% - 10px);
        }

        .dashboard,
        .detail-grid {
          grid-template-columns: 1fr;
        }

        .detail-cards {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .dashboard {
          grid-template-rows: auto auto auto;
        }

        .ranking-panel,
        .trend-panel,
        .detail-pane {
          height: auto;
        }

        body {
          overflow: auto;
        }
      }

      @media (max-width: 760px) {
        body {
          padding: 10px;
        }

        .cards {
          grid-template-columns: 1fr;
        }

        .detail-box {
          flex-basis: 100%;
        }

        .detail-cards {
          grid-template-columns: 1fr;
        }

        .topbar,
        .card,
        .ranking-panel,
        .trend-panel,
        .detail-panel {
          padding: 14px;
        }

        .dimension-tabs,
        .toolbar-group {
          width: 100%;
          justify-content: stretch;
        }

        .dimension-tab,
        .toolbar-field,
        .toolbar-action {
          width: 100%;
        }

        .toolbar {
          width: 100%;
          justify-content: stretch;
        }

        .toolbar-group {
          flex-direction: column;
          align-items: stretch;
        }

        th,
        td {
          padding: 10px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition: none !important;
          animation: none !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="page app-shell">
      <section class="panel topbar">
        <div class="topbar-row">
          <div class="brand">
            <div class="brand-mark">T</div>
            <div class="brand-copy">
              <h1>Traffic Monitor</h1>
              <p>单屏流量监控面板，聚合统计、趋势和钻取明细集中展示。</p>
            </div>
            <div class="dimension-tabs" role="tablist" aria-label="聚合维度">
              <button class="dimension-tab active" type="button" data-dimension="sourceIP">设备</button>
              <button class="dimension-tab" type="button" data-dimension="host">主机</button>
              <button class="dimension-tab" type="button" data-dimension="outbound">代理</button>
            </div>
            <select id="dimension" class="hidden-select" aria-hidden="true" tabindex="-1">
              <option value="sourceIP">设备</option>
              <option value="host">目标主机</option>
              <option value="outbound">出口节点</option>
            </select>
          </div>

          <div class="toolbar">
            <div class="toolbar-group">
              <div class="toolbar-field">
                <label for="range">范围</label>
                <select id="range">
                  <option value="3600000">最近 1 小时</option>
                  <option value="86400000">最近 24 小时</option>
                  <option value="2592000000">最近 30 天</option>
                  <option value="-1">自定义</option>
                </select>
              </div>
              <div class="toolbar-field">
                <label for="start">开始</label>
                <input id="start" type="datetime-local" />
              </div>
              <div class="toolbar-field">
                <label for="end">结束</label>
                <input id="end" type="datetime-local" />
              </div>
            </div>
            <button id="refreshBtn" class="toolbar-action primary" type="button">刷新</button>
            <button id="clearBtn" class="toolbar-action danger" type="button">清空</button>
          </div>
        </div>
      </section>

      <section class="cards">
        <div class="panel card">
          <div class="card-top">
            <div id="countLabel" class="card-label">设备</div>
            <div class="card-badge count">#</div>
          </div>
          <div id="countValue" class="card-value">0</div>
        </div>
        <div class="panel card">
          <div class="card-top">
            <div class="card-label">上传</div>
            <div class="card-badge up">↑</div>
          </div>
          <div id="uploadValue" class="card-value">0 B</div>
          <div class="card-note"></div>
        </div>
        <div class="panel card">
          <div class="card-top">
            <div class="card-label">下载</div>
            <div class="card-badge down">↓</div>
          </div>
          <div id="downloadValue" class="card-value">0 B</div>
          <div class="card-note"></div>
        </div>
        <div class="panel card">
          <div class="card-top">
            <div class="card-label">总流量</div>
            <div class="card-badge total">Σ</div>
          </div>
          <div id="totalValue" class="card-value">0 B</div>
          <div class="card-note"></div>
        </div>
      </section>

      <section class="dashboard">
        <section class="panel ranking-panel">
          <div class="panel-head">
            <div>
              <h2 id="primaryTitle" class="panel-title">设备</h2>
            </div>
          </div>

          <div id="tableBody" class="ranking-list">
            <div class="empty">加载中...</div>
          </div>
        </section>

        <section class="panel trend-panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">流量</h2>
            </div>
          </div>
          <canvas id="trendCanvas"></canvas>
        </section>

        <section class="panel detail-panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">链路明细</h2>
            </div>
          </div>

          <div class="detail-grid">
            <section class="detail-pane">
              <div class="detail-table-shell">
                <div class="detail-table-head">
                  <div class="pane-title" id="secondaryHeaderWrap">访问主机列表</div>
                  <input id="detailSearch" class="detail-search" type="search" placeholder="搜索" />
                </div>
                <div class="detail-table-wrap">
                  <table class="compact-table secondary-table">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th id="secondaryHeader">主机</th>
                      <th>上传</th>
                      <th>下载</th>
                      <th>总量</th>
                    </tr>
                  </thead>
                  <tbody id="secondaryBody">
                    <tr>
                      <td colspan="5" class="empty">选择左侧分组后加载</td>
                    </tr>
                  </tbody>
                  </table>
                </div>
              </div>
            </section>
          </div>
        </section>
      </section>
    </div>

    <script>
      const drilldownConfig = {
        sourceIP: {
          secondaryLabel: "访问主机",
        },
        host: {
          secondaryLabel: "访问设备",
        },
        outbound: {
          secondaryLabel: "目标主机",
        },
      }

      const elements = {
        dimension: document.getElementById("dimension"),
        dimensionTabs: Array.from(document.querySelectorAll(".dimension-tab")),
        range: document.getElementById("range"),
        start: document.getElementById("start"),
        end: document.getElementById("end"),
        refreshBtn: document.getElementById("refreshBtn"),
        clearBtn: document.getElementById("clearBtn"),
        countLabel: document.getElementById("countLabel"),
        primaryTitle: document.getElementById("primaryTitle"),
        countValue: document.getElementById("countValue"),
        uploadValue: document.getElementById("uploadValue"),
        downloadValue: document.getElementById("downloadValue"),
        totalValue: document.getElementById("totalValue"),
        tableBody: document.getElementById("tableBody"),
        trendCanvas: document.getElementById("trendCanvas"),
        secondaryHeader: document.getElementById("secondaryHeader"),
        secondaryHeaderWrap: document.getElementById("secondaryHeaderWrap"),
        detailSearch: document.getElementById("detailSearch"),
        secondaryBody: document.getElementById("secondaryBody"),
      }

      const state = {
        lastTrendPoints: [],
        primaryRows: [],
        secondaryRows: [],
        detailRows: [],
        selectedPrimary: null,
        selectedSecondary: null,
        detailSearchQuery: "",
        loadSeq: 0,
        detailSeq: 0,
      }

      function nowLocalInputValue(offsetMs) {
        const date = new Date(Date.now() + offsetMs)
        const pad = (value) => String(value).padStart(2, "0")
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`
      }

      function updateCustomInputs() {
        const range = Number(elements.range.value)
        const end = Date.now()
        const start = range === -1 ? end - 86400000 : end - range
        elements.start.value = nowLocalInputValue(start - end)
        elements.end.value = nowLocalInputValue(0)
      }

      function getTimeRange() {
        if (Number(elements.range.value) === -1) {
          return {
            start: new Date(elements.start.value).getTime(),
            end: new Date(elements.end.value).getTime(),
          }
        }

        const end = Date.now()
        return {
          end,
          start: end - Number(elements.range.value),
        }
      }

      function bucketSize(start, end) {
        const range = end - start
        if (range <= 3600000) return 60000
        if (range <= 86400000) return 300000
        if (range <= 604800000) return 3600000
        return 86400000
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) return "0 B"
        const units = ["B", "KB", "MB", "GB", "TB"]
        let value = bytes
        let idx = 0
        while (value >= 1024 && idx < units.length - 1) {
          value /= 1024
          idx += 1
        }
        return `${value.toFixed(value >= 10 || idx === 0 ? 0 : 1)} ${units[idx]}`
      }

      function escapeHTML(text) {
        return String(text ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;")
      }

      function renderTruncatedText(text, className = "", fallback = "Unknown") {
        const value = String(text || fallback)
        const safe = escapeHTML(value)
        const cls = className ? `truncate ${className}` : "truncate"
        return `<span class="${cls}" title="${safe}">${safe}</span>`
      }

      function setStatus(text, isError = false) {
        void text
        void isError
      }

      async function fetchJSON(path, params) {
        const url = new URL(path, window.location.origin)
        Object.entries(params || {}).forEach(([key, value]) => {
          if (value !== undefined && value !== null) {
            url.searchParams.set(key, String(value))
          }
        })

        const response = await fetch(url)
        if (!response.ok) {
          const payload = await response.json().catch(() => ({}))
          throw new Error(payload.error || `Request failed: ${response.status}`)
        }
        return response.json()
      }

      function syncDimensionTabs() {
        elements.dimensionTabs.forEach((button) => {
          button.classList.toggle("active", button.dataset.dimension === elements.dimension.value)
        })
      }

      function updateViewHints() {
        const config = drilldownConfig[elements.dimension.value]
        const countLabelMap = {
          sourceIP: "设备",
          host: "主机",
          outbound: "代理",
        }
        const rankingTitleMap = {
          sourceIP: "设备",
          host: "主机",
          outbound: "代理",
        }
        elements.countLabel.textContent = countLabelMap[elements.dimension.value] || "设备"
        elements.primaryTitle.textContent = rankingTitleMap[elements.dimension.value] || "设备"
        elements.secondaryHeader.textContent = config.secondaryLabel
        elements.secondaryHeaderWrap.textContent = `${config.secondaryLabel}列表`
        syncDimensionTabs()
      }

      function renderCards(rows) {
        const upload = rows.reduce((sum, row) => sum + row.upload, 0)
        const download = rows.reduce((sum, row) => sum + row.download, 0)
        elements.countValue.textContent = String(rows.length)
        elements.uploadValue.textContent = formatBytes(upload)
        elements.downloadValue.textContent = formatBytes(download)
        elements.totalValue.textContent = formatBytes(upload + download)
      }

      function renderPrimaryTable(rows) {
        if (!rows.length) {
          elements.tableBody.innerHTML = '<div class="empty">当前时间范围内没有数据</div>'
          return
        }

        elements.tableBody.innerHTML = rows
          .slice(0, 120)
          .map((row, index) => {
            const active = state.selectedPrimary === row.label ? " active" : ""
            return `
              <div class="ranking-item primary-row${active}" tabindex="0" data-primary="${escapeHTML(row.label)}">
                <div class="ranking-main">
                  <div class="ranking-title">
                    <span class="rank">${index + 1}</span>
                    <div class="mono">${renderTruncatedText(row.label, "host", "-")}</div>
                  </div>
                  <div class="mono" style="font-weight:800; color:${state.selectedPrimary === row.label ? "var(--accent)" : "var(--text)"}">${formatBytes(row.total)}</div>
                </div>
                <div class="ranking-metrics">
                  <span>↑ ${formatBytes(row.upload)}</span>
                  <span>↓ ${formatBytes(row.download)}</span>
                </div>
              </div>
            `
          })
          .join("")
      }

      function renderSecondaryTable(rows) {
        const filteredRows = rows.filter((row) =>
          row.label.toLowerCase().includes(state.detailSearchQuery.toLowerCase()),
        )

        if (!filteredRows.length) {
          elements.secondaryBody.innerHTML = '<tr><td colspan="5" class="empty">暂无数据</td></tr>'
          return
        }

        const detailCards = !state.detailRows.length
          ? '<div class="detail-empty">暂无链路明细</div>'
          : state.detailRows
              .slice(0, 120)
              .map((row) => {
                const chips = (row.chains || [])
                  .map((item) => `<span class="chip route">${escapeHTML(item)}</span>`)
                  .join("")

                return `
                  <article class="detail-card">
                    <div class="detail-card-head">
                      <div class="detail-card-title mono">
                        ${renderTruncatedText(row.destinationIP || row.outbound || "Unknown", "card-title")}
                      </div>
                      <div class="detail-card-total">${formatBytes(row.total)}</div>
                    </div>
                    <div class="detail-card-meta">
                      <span title="${escapeHTML(row.sourceIP || "Inner")}">${escapeHTML(row.sourceIP || "Inner")}</span>
                      <span title="${escapeHTML(row.outbound || "DIRECT")}">${escapeHTML(row.outbound || "DIRECT")}</span>
                    </div>
                    <div class="detail-card-meta">
                      <span>↑ ${formatBytes(row.upload)}</span>
                      <span>↓ ${formatBytes(row.download)}</span>
                    </div>
                    <div class="chips">${chips || '<span class="chip route">DIRECT</span>'}</div>
                  </article>
                `
              })
              .join("")

        elements.secondaryBody.innerHTML = filteredRows
          .slice(0, 120)
          .map((row, index) => {
            const active = state.selectedSecondary === row.label ? " active" : ""
            const expanded = state.selectedSecondary === row.label
              ? `
                <tr class="expanded-row">
                  <td colspan="5">
                    <div class="expanded-block">
                      <div class="detail-cards">${detailCards}</div>
                    </div>
                  </td>
                </tr>
              `
              : ""
            return `
              <tr class="secondary-row${active}" tabindex="0" data-secondary="${escapeHTML(row.label)}">
                <td><span class="rank">${index + 1}</span></td>
                <td><div class="mono">${renderTruncatedText(row.label, "host", "-")}</div></td>
                <td>${formatBytes(row.upload)}</td>
                <td>${formatBytes(row.download)}</td>
                <td class="mono">${formatBytes(row.total)}</td>
              </tr>
              ${expanded}
            `
          })
          .join("")
      }

      function renderDetails(rows) {
        void rows
      }

      function renderTrend(points) {
        state.lastTrendPoints = points
        const canvas = elements.trendCanvas
        const dpr = window.devicePixelRatio || 1
        const rect = canvas.getBoundingClientRect()
        const width = Math.max(320, Math.floor(rect.width || 860))
        const height = Math.max(220, Math.floor(rect.height || 260))
        canvas.width = width * dpr
        canvas.height = height * dpr

        const ctx = canvas.getContext("2d")
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
        ctx.clearRect(0, 0, width, height)

        const values = points.map((point) => point.upload + point.download)
        const max = Math.max(...values, 1)
        const left = 56
        const right = width - 18
        const top = 18
        const bottom = height - 28

        ctx.strokeStyle = "rgba(167, 181, 198, 0.45)"
        ctx.lineWidth = 1
        for (let i = 0; i <= 4; i += 1) {
          const y = top + ((bottom - top) / 4) * i
          ctx.beginPath()
          ctx.moveTo(left, y)
          ctx.lineTo(right, y)
          ctx.stroke()
        }

        ctx.fillStyle = "#748399"
        ctx.font = '12px "Segoe UI", sans-serif'
        ctx.fillText(formatBytes(max), 8, top + 4)
        ctx.fillText("0 B", 18, bottom)

        if (!points.length) return

        const linePoints = points.map((point, index) => {
          const x = left + ((right - left) * index) / Math.max(points.length - 1, 1)
          const y = bottom - ((bottom - top) * (point.upload + point.download)) / max
          return [x, y]
        })

        const areaGradient = ctx.createLinearGradient(0, top, 0, bottom)
        areaGradient.addColorStop(0, "rgba(61, 184, 255, 0.26)")
        areaGradient.addColorStop(1, "rgba(61, 184, 255, 0.02)")

        ctx.beginPath()
        linePoints.forEach(([x, y], index) => {
          if (index === 0) ctx.moveTo(x, y)
          else ctx.lineTo(x, y)
        })
        ctx.strokeStyle = "#3db8ff"
        ctx.lineWidth = 2.5
        ctx.stroke()

        ctx.lineTo(right, bottom)
        ctx.lineTo(left, bottom)
        ctx.closePath()
        ctx.fillStyle = areaGradient
        ctx.fill()
      }

      async function loadSecondaryRows(primaryLabel) {
        const { start, end } = getTimeRange()
        const dimension = elements.dimension.value

        if (!primaryLabel) {
          state.secondaryRows = []
          state.detailRows = []
          renderSecondaryTable([])
          renderDetails([])
          return
        }

        let path = "/api/traffic/substats"
        let params
        if (dimension === "host") {
          path = "/api/traffic/devices-by-host"
          params = { host: primaryLabel, start, end }
        } else {
          params = { dimension, label: primaryLabel, start, end }
        }

        const rows = await fetchJSON(path, params)
        state.secondaryRows = rows
        state.selectedSecondary = rows[0]?.label || null
        renderSecondaryTable(rows)

        if (state.selectedSecondary) {
          await loadDetails(primaryLabel, state.selectedSecondary)
        } else {
          renderDetails([])
        }
      }

      async function loadDetails(primaryLabel, secondaryLabel) {
        const { start, end } = getTimeRange()
        const seq = ++state.detailSeq

        const rows = await fetchJSON("/api/traffic/details", {
          dimension: elements.dimension.value,
          primary: primaryLabel,
          secondary: secondaryLabel,
          start,
          end,
        })

        if (seq !== state.detailSeq) return

        state.detailRows = rows
        renderSecondaryTable(state.secondaryRows)
        renderDetails(rows)
      }

      function resetDetailPanels() {
        state.selectedPrimary = null
        state.selectedSecondary = null
        state.secondaryRows = []
        state.detailRows = []
        state.detailSearchQuery = ""
        if (elements.detailSearch) elements.detailSearch.value = ""
        renderSecondaryTable([])
        renderDetails([])
      }

      async function loadData() {
        const { start, end } = getTimeRange()
        if (!Number.isFinite(start) || !Number.isFinite(end) || start <= 0 || end <= 0 || end < start) {
          setStatus("时间范围无效", true)
          return
        }

        const seq = ++state.loadSeq
        setStatus("加载中...")
        elements.refreshBtn.disabled = true

        try {
          updateViewHints()
          resetDetailPanels()

          const [rows, trend] = await Promise.all([
            fetchJSON("/api/traffic/aggregate", {
              dimension: elements.dimension.value,
              start,
              end,
            }),
            fetchJSON("/api/traffic/trend", {
              start,
              end,
              bucket: bucketSize(start, end),
            }),
          ])

          if (seq !== state.loadSeq) return

          state.primaryRows = rows
          state.selectedPrimary = rows[0]?.label || null

          renderCards(rows)
          renderPrimaryTable(rows)
          renderTrend(trend)

          if (state.selectedPrimary) {
            await loadSecondaryRows(state.selectedPrimary)
            renderPrimaryTable(state.primaryRows)
          }

          setStatus("")
        } catch (error) {
          console.error(error)
          setStatus(error.message || "加载失败", true)
        } finally {
          elements.refreshBtn.disabled = false
        }
      }

      async function clearLogs() {
        if (!window.confirm("确认清空所有历史流量记录吗？")) return

        setStatus("正在清空...")
        elements.clearBtn.disabled = true

        try {
          const response = await fetch("/api/traffic/logs", { method: "DELETE" })
          if (!response.ok) {
            const payload = await response.json().catch(() => ({}))
            throw new Error(payload.error || "清空失败")
          }
          await loadData()
        } catch (error) {
          console.error(error)
          setStatus(error.message || "清空失败", true)
        } finally {
          elements.clearBtn.disabled = false
        }
      }

      elements.range.addEventListener("change", () => {
        if (Number(elements.range.value) !== -1) updateCustomInputs()
      })

      elements.dimensionTabs.forEach((button) => {
        button.addEventListener("click", () => {
          const nextDimension = button.dataset.dimension
          if (!nextDimension || nextDimension === elements.dimension.value) return
          elements.dimension.value = nextDimension
          updateViewHints()
          loadData()
        })
      })

      elements.refreshBtn.addEventListener("click", loadData)
      elements.clearBtn.addEventListener("click", clearLogs)
      elements.detailSearch.addEventListener("input", (event) => {
        state.detailSearchQuery = event.target.value || ""
        renderSecondaryTable(state.secondaryRows)
      })

      elements.tableBody.addEventListener("click", async (event) => {
        const row = event.target.closest("[data-primary]")
        if (!row) return
        state.selectedPrimary = row.dataset.primary
        renderPrimaryTable(state.primaryRows)
        try {
          await loadSecondaryRows(state.selectedPrimary)
        } catch (error) {
          console.error(error)
          setStatus(error.message || "加载二级明细失败", true)
        }
      })

      elements.tableBody.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return
        const row = event.target.closest("[data-primary]")
        if (!row) return
        event.preventDefault()
        row.click()
      })

      elements.secondaryBody.addEventListener("click", async (event) => {
        const row = event.target.closest("[data-secondary]")
        if (!row || !state.selectedPrimary) return
        state.selectedSecondary = row.dataset.secondary
        renderSecondaryTable(state.secondaryRows)
        try {
          await loadDetails(state.selectedPrimary, state.selectedSecondary)
        } catch (error) {
          console.error(error)
          setStatus(error.message || "加载链路明细失败", true)
        }
      })

      elements.secondaryBody.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return
        const row = event.target.closest("[data-secondary]")
        if (!row) return
        event.preventDefault()
        row.click()
      })

      window.addEventListener("resize", () => {
        renderTrend(state.lastTrendPoints)
      })

      updateCustomInputs()
      updateViewHints()
      loadData()
      setInterval(loadData, 30000)
    </script>
  </body>
</html>
